<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09-Tables</title>
    <link rel="stylesheet" href="../src/css/master.css">
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            thead {
                th {
                    background-color: #000;
                    padding: 0.4rem 0.6rem;
                }
            }
            tbody {
                tr {
                    &:first-of-type {
                        border-top: 1px solid #fff;
                    }
                    &:nth-child(even) {
                        background-color: #fff3;
                    }
                    td {
                        border-bottom: 1px solid #fff;
                        font-size: 0.8rem;
                        padding: 0.4rem;
                    }
                }
            }
            tfoot {
                td {
                    background-color: #000;
                    padding: 0.4rem 0.6rem;
                    font-size: 0.8rem;
                    text-align: center;
                }
            }
        }
    </style>
</head>
<body class="html">
    <a href="index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header class="mainmenu">
            <h1>09-Tables</h1>
            <h3>Creates tables for data display.  </h3>
        </header>
        <section>
            <table>
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>FullName</th>
                        <th>Phone</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>01</td>
                        <td>Homer Simpson</td>
                        <td>3201231234</td>
                    </tr>
                    <tr>
                        <td>02</td>
                        <td>Marge Simpson</td>
                        <td>3201231235</td>
                    </tr>
                    <tr>
                        <td>03</td>
                        <td>Bart Simpson</td>
                        <td>3201231236</td>
                    </tr>
                    <tr>
                        <td>04</td>
                        <td>Lisa Simpson</td>
                        <td>3201231237</td>
                    </tr>
                    <tr>
                        <td>05</td>
                        <td>Maggie Simpson</td>
                        <td>3201231238</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3">Simpson Family</td>
                    </tr>
                </tfoot>
            </table>
        </section>
    </main>
</body>
</html>
